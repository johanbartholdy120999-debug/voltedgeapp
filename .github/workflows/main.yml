name: VoltEdge CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  continuous-integration:
    name: CI - Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Imports
        run: |
          python -c "import database"
          python -c "import models"
          python -c "import main"

      - name: Seed Database
        run: |
          python seed_database.py

      - name: Train ML Models
        run: |
          python train_model.py

      - name: Generate Plots
        run: |
          python plot_models.py

      - name: Run Tests
        run: |
          python -m pytest -v

      - name: Start API
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 20

      - name: Test API
        run: |
          curl --fail http://localhost:8000/docs

  continuous-deployment:
    name: CD - Docker Hub Deployment
    needs: continuous-integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t johanbart/voltedge-api:latest .

      - name: Verify Docker Image
        run: |
          docker images

      - name: Test Docker Container
        run: |
          docker run -d --name voltedge -p 8000:8000 johanbart/voltedge-api:latest
          sleep 20
          curl --fail http://localhost:8000/docs
          docker stop voltedge
          docker rm voltedge

      - name: Push Docker Image
        run: |
          docker push johanbart/voltedge-api:latest
