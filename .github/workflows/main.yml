name: VoltEdge CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  continuous-integration:
    name: CI - Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Verify Imports
        run: |
          python -c "import database"
          python -c "import models"
          python -c "import main"

      - name: Seed Database
        run: |
          python seed_database.py

      - name: Train ML Models
        run: |
          python train_model.py

      - name: Generate Plots
        run: |
          python plot_models.py

      - name: Run Tests
        run: |
          python -m pytest -v

      - name: Start API
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 20

      - name: Test API
        run: |
          curl --fail http://localhost:8000/docs

  docker-image-artifact:
    name: CD - Build Docker Image Artifact
    needs: continuous-integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t voltedge-api:latest .

      - name: Run Docker Container
        run: |
          docker run -d --name voltedge -p 8000:8000 voltedge-api:latest
          sleep 20

      - name: Test Docker API
        run: |
          curl --fail http://localhost:8000/docs

      - name: Save Docker Image As TAR
        run: |
          docker save voltedge-api:latest -o voltedge-api.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoltEdge-Docker-Image
          path: voltedge-api.tar
